<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - iPhoneCongo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="../assets/logo.svg" alt="Logo iPhoneCongo">
      <h1>iPhone<span>Congo</span></h1>
    </div>
    <div class="header-actions">
      <button id="logout" class="btn-mini call">Déconnexion</button>
    </div>
  </header>

  <main style="padding:1rem; max-width:1000px; margin:0 auto;">

    <h2 style="margin-bottom:1rem;">Dashboard Admin</h2>

    <div style="margin-bottom:1.5rem;">
      <button id="add-product-btn" style="padding:0.6rem 1rem; background:var(--secondary); color:white; border:none; border-radius:var(--radius-xl); cursor:pointer;">➕ Ajouter un produit</button>
    </div>

    <table style="width:100%; border-collapse:collapse;">
      <thead>
        <tr style="background:var(--light);">
          <th style="padding:0.5rem; border:1px solid var(--light-gray)">ID</th>
          <th style="padding:0.5rem; border:1px solid var(--light-gray)">Titre</th>
          <th style="padding:0.5rem; border:1px solid var(--light-gray)">Catégorie</th>
          <th style="padding:0.5rem; border:1px solid var(--light-gray)">Prix</th>
          <th style="padding:0.5rem; border:1px solid var(--light-gray)">Actions</th>
        </tr>
      </thead>
      <tbody id="products-table">
        <!-- Produits injectés ici -->
      </tbody>
    </table>

  </main>

  <script src="admin.js"></script>
</body>
</html>
