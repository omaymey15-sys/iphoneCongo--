<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un store - iPhoneCongo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="../assets/logo.svg" alt="Logo iPhoneCongo">
    <h1>iPhone<span>Congo</span></h1>
  </div>
  <div class="header-actions">
    <a href="../index.html" class="btn-mini call">Accueil</a>
    <a href="../store.html" class="btn-mini whatsapp">Stores</a>
  </div>
</header>

<main>
  <h2>Créez votre store</h2>

  <form id="register-form">
    <label>Nom du store *</label>
    <input type="text" id="store-name" required>

    <label>Pseudo unique *</label>
    <input type="text" id="store-pseudo" required>

    <label>Ville *</label>
    <input type="text" id="store-city" required>

    <label>WhatsApp *</label>
    <input type="text" id="store-whatsapp" required>

    <label>Mot de passe *</label>
    <input type="password" id="store-password" required>

    <label>Logo (URL)</label>
    <input type="text" id="store-logo" placeholder="Ex: https://...">

    <button type="submit" class="btn-add-store">Créer mon store</button>
  </form>
</main>

<script>
const STORES_KEY = 'iphonecongo_stores';
const STORE_PRODUCTS_KEY = 'iphonecongo_store_products';

document.getElementById('register-form').addEventListener('submit', function(e){
  e.preventDefault();

  const name = document.getElementById('store-name').value.trim();
  const pseudo = document.getElementById('store-pseudo').value.trim();
  const city = document.getElementById('store-city').value.trim();
  const whatsapp = document.getElementById('store-whatsapp').value.trim();
  const password = document.getElementById('store-password').value.trim();
  const logo = document.getElementById('store-logo').value.trim() || '../assets/logo.svg';

  if(!name || !pseudo || !city || !whatsapp || !password){
    return alert('Remplissez tous les champs obligatoires !');
  }

  let stores = JSON.parse(localStorage.getItem(STORES_KEY)) || [];
  let storeProducts = JSON.parse(localStorage.getItem(STORE_PRODUCTS_KEY)) || {};

  const id = stores.length ? Math.max(...stores.map(s=>s.id))+1 : 1001;

  stores.push({id,name,pseudo,city,whatsapp,password,logo,date:new Date().toISOString()});
  storeProducts[id] = [];

  localStorage.setItem(STORES_KEY, JSON.stringify(stores));
  localStorage.setItem(STORE_PRODUCTS_KEY, JSON.stringify(storeProducts));

  alert('Store créé avec succès !');
  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
