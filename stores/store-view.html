<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store - iPhoneCongo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="../assets/logo.svg" alt="Logo iPhoneCongo">
    <h1>iPhone<span>Congo</span></h1>
  </div>
  <div class="header-actions">
    <a href="../index.html" class="btn-mini call">Accueil</a>
    <a href="../store.html" class="btn-mini whatsapp">Stores</a>
  </div>
</header>

<main>
  <h2 id="store-name">Store</h2>
  <p id="store-city"></p>
  <a id="store-whatsapp" href="#" target="_blank" class="btn-mini whatsapp">WhatsApp</a>

  <h3>Produits</h3>
  <div id="store-products" class="horiz-scroll">
    <!-- Produits ici -->
  </div>
</main>

<script>
const STORE_PRODUCTS_KEY = 'iphonecongo_store_products';
const STORES_KEY = 'iphonecongo_stores';

function getStoreIdFromURL(){
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get('store'));
}

function displayStore(){
  const storeId = getStoreIdFromURL();
  const stores = JSON.parse(localStorage.getItem(STORES_KEY)) || [];
  const storeProducts = JSON.parse(localStorage.getItem(STORE_PRODUCTS_KEY)) || {};

  const store = stores.find(s=>s.id===storeId);
  if(!store) return alert('Store non trouvé !');

  document.getElementById('store-name').textContent = store.name;
  document.getElementById('store-city').textContent = store.city;
  document.getElementById('store-whatsapp').href = `https://wa.me/${store.whatsapp}`;

  const productsContainer = document.getElementById('store-products');
  productsContainer.innerHTML = '';

  (storeProducts[storeId] || []).forEach(p=>{
    const div = document.createElement('div');
    div.classList.add('horiz-card');
    div.innerHTML = `
      <img src="${p.image}" alt="${p.title}">
      <div class="info">
        <div class="title">${p.title}</div>
        <div class="price">${p.price}</div>
      </div>
    `;
    productsContainer.appendChild(div);
  });
}

document.addEventListener('DOMContentLoaded', displayStore);
</script>
</body>
</html>
