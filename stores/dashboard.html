<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Store - iPhoneCongo</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="../assets/logo.svg" alt="Logo iPhoneCongo">
    <h1>iPhone<span>Congo</span></h1>
  </div>
  <div class="header-actions">
    <a href="../index.html" class="btn-mini call">Accueil</a>
    <a href="../store.html" class="btn-mini whatsapp">Stores</a>
  </div>
</header>

<main>
  <h2 id="store-name">Mon Store</h2>

  <button class="btn-add-store" id="add-product">➕ Ajouter un produit</button>

  <div id="products-container" class="horiz-scroll">
    <!-- Produits du store -->
  </div>
</main>

<script>
const STORE_PRODUCTS_KEY = 'iphonecongo_store_products';
const STORES_KEY = 'iphonecongo_stores';

// Pour simplifier, on prend le dernier store créé
let stores = JSON.parse(localStorage.getItem(STORES_KEY)) || [];
const currentStore = stores[stores.length-1];

document.getElementById('store-name').textContent = currentStore.name;

function displayProducts(){
  const container = document.getElementById('products-container');
  container.innerHTML = '';

  const storeProducts = JSON.parse(localStorage.getItem(STORE_PRODUCTS_KEY)) || {};
  (storeProducts[currentStore.id] || []).forEach(p=>{
    const div = document.createElement('div');
    div.classList.add('horiz-card');
    div.innerHTML = `
      <img src="${p.image}" alt="${p.title}">
      <div class="info">
        <div class="title">${p.title}</div>
        <div class="price">${p.price}</div>
      </div>
    `;
    container.appendChild(div);
  });
}

document.getElementById('add-product').addEventListener('click', ()=>{
  const title = prompt("Nom du produit :");
  const price = prompt("Prix :");
  const image = prompt("URL image :");

  if(title && price && image){
    const storeProducts = JSON.parse(localStorage.getItem(STORE_PRODUCTS_KEY)) || {};
    storeProducts[currentStore.id].push({title,price,image});
    localStorage.setItem(STORE_PRODUCTS_KEY, JSON.stringify(storeProducts));
    displayProducts();
  }
});

displayProducts();
</script>
</body>
</html>
